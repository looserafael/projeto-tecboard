<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
          content="Tecboard App - monitore suas aplicações em tempo real com alertas inteligentes. Mantenha-se informado sobre o desempenho e a disponibilidade de suas aplicações para garantir que elas nunca saiam do ar sem você saber.">
    <!-- A tag <meta> é usada para fornecer metadados sobre o documento HTML. O atributo name especifica o tipo de metadado, enquanto o atributo content define o valor do metadado. No exemplo, estamos usando a tag <meta> para fornecer uma descrição da página, que pode ser usada por mecanismos de busca e redes sociais para exibir um resumo do conteúdo da página. -->
    <link rel="icon" href="favicon-roxo.svg" type="image/svg+xml">
    <!-- A tag <link> é usada para vincular um recurso externo à página, como uma folha de estilo CSS ou um ícone de favicon. O atributo rel especifica a relação entre o documento atual e o recurso vinculado, enquanto o atributo href define o caminho para o recurso. No exemplo, estamos vinculando um ícone de favicon para a página. -->
    <link rel="stylesheet" href="css/style.css">
    <!-- A tag <link> é usada para vincular um recurso externo à página, como uma folha de estilo CSS ou um ícone de favicon. O atributo rel especifica a relação entre o documento atual e o recurso vinculado, enquanto o atributo href define o caminho para o recurso. No exemplo, estamos vinculando uma folha de estilo CSS externa chamada "style.css" para aplicar estilos personalizados à página. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
          href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Unbounded:wght@200..900&display=swap"
          rel="stylesheet">
    <!-- As tags <link> com rel="preconnect" são usadas para estabelecer conexões antecipadas com domínios externos, como fontes do Google Fonts. Isso pode melhorar o desempenho do carregamento da página, permitindo que o navegador estabeleça conexões antes de realmente solicitar os recursos. No exemplo, estamos pré-conectando aos domínios do Google Fonts para otimizar o carregamento das fontes usadas na página. -->
    <title>Tecboard</title>
    <meta name="google-site-verification" content="dSpMSpwMg_qVZqMSxkxzWhv3YJDNsIfZO02PLZaosGg" />
</head>

<body>
    <header>
        <img src="img/logo-branco.png"
             alt="Logo do Tecboard App, com o nome 'Tecboard' em letras brancas e um ícone de gráfico de barras ao lado.">
    </header>
    <main>
        <!-- A tag <main> é usada para envolver o conteúdo principal de um documento HTML. Ela é destinada a conter o conteúdo que é diretamente relacionado ao tema central da página, como artigos, seções ou outras informações relevantes. No exemplo, estamos usando a tag <main> para envolver a seção principal do conteúdo da página, que inclui um título, um parágrafo, um link e uma imagem. -->
        <section>
            <h1>
                <span>Fique de
                    olho</span><br> no que
                importa
            </h1>
            <p>Monitoramento em tempo real com alertas
                inteligentes para sua aplicação nunca sair do ar sem você saber.
            </p>
            <a href="#" title="Teste a versão demo ao App Tecboard">Testar versão
                demo</a><!-- A tag <a> é usada para criar um link para outra página ou recurso. O atributo href especifica o URL do destino do link, enquanto o atributo title fornece informações adicionais sobre o link, que podem ser exibidas como uma dica de ferramenta. No exemplo, estamos criando um link para testar a versão demo do App Tecboard. -->
            <img src="img/celulares-sobrepostos-desktop.png"
                 alt="Tela do App Tecboard em dois celulares sobrepostos, com destaque para o hub de eventos de tecnologia.">
        </section>
    </main>
</body>

</html>
